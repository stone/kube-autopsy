apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-autopsy-controller
  namespace: kube-autopsy
  labels:
    app.kubernetes.io/name: kube-autopsy
    app.kubernetes.io/component: controller
    app.kubernetes.io/part-of: kube-autopsy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-autopsy
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-autopsy
        app.kubernetes.io/component: controller
        app.kubernetes.io/part-of: kube-autopsy
    spec:
      serviceAccountName: kube-autopsy
      containers:
        - name: controller
          image: ghcr.io/stone/kube-autopsy:latest
          args: ["controller", "--leader-elect=true"]
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
