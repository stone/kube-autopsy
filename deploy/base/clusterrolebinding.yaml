apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-autopsy-rolebinding
  labels:
    app.kubernetes.io/name: kube-autopsy
    app.kubernetes.io/part-of: kube-autopsy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-autopsy-role
subjects:
  - kind: ServiceAccount
    name: kube-autopsy
    namespace: kube-autopsy
