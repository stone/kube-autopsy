name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # Needed for creating GitHub Releases
  packages: write # Needed to publish to GHCR
  id-token: write # Needed for keyless signing with sigstore/cosign

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build, Push, and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for changelog generation and tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run Tests
        run: make test

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to the Container registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5.1.0

      - name: Build Kubernetes Manifest
        run: |
          cat <<EOF >> deploy/base/kustomization.yaml
          images:
            - name: ghcr.io/stone/kube-autopsy
              newName: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
              newTag: ${{ github.ref_name }}
          EOF
          kubectl kustomize deploy/base > install.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          generate_release_notes: true
          files: |
            sbom.spdx.json
            install.yaml
